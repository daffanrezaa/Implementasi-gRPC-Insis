<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SiAntre — Sistem Antrian Layanan Publik Digital SAMSAT" />
  <title>SiAntre — Antrian SAMSAT</title>

  <!-- DaisyUI + Tailwind CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- anime.js -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-base-200">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar bg-base-100 shadow-lg sticky top-0 z-50">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl font-bold">
        <span class="text-primary">Si</span>Antre
      </a>
      <span class="badge badge-outline badge-sm ml-2">SAMSAT Digital</span>
    </div>
    <div class="flex-none gap-2">
      <div id="ws-status-badge" class="badge badge-warning gap-1">
        <span class="loading loading-ring loading-xs"></span> Menghubungkan...
      </div>
    </div>
  </nav>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main class="container mx-auto p-4 max-w-7xl">

    <!-- Alert untuk notifikasi YOUR_TURN -->
    <div id="your-turn-banner" class="alert alert-success shadow-lg mb-4 hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      <div>
        <h3 class="font-bold">🎉 Giliran Anda!</h3>
        <div class="text-xs">Segera menuju loket yang tersedia.</div>
      </div>
    </div>

    <!-- Grid: 3 komponen event-driven -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">

      <!-- 1. Nomor Antrian Saat Ini -->
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body items-center text-center">
          <h2 class="card-title text-sm uppercase tracking-wider opacity-70">Nomor Dilayani</h2>
          <div id="current-number-display" class="text-6xl font-bold text-primary tabular-nums">
            0
          </div>
          <p id="total-waiting-display" class="text-sm opacity-60">Menunggu: —</p>
        </div>
      </div>

      <!-- 2. Grafik Antrian (ApexCharts) -->
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-sm uppercase tracking-wider opacity-70">Grafik Antrian</h2>
          <div id="queue-chart" class="w-full h-48"></div>
        </div>
      </div>

      <!-- 3. Status Layanan -->
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-sm uppercase tracking-wider opacity-70">Status Layanan</h2>
          <div id="services-status-list" class="space-y-2">
            <div class="flex items-center gap-2 text-sm opacity-50">
              <span class="loading loading-spinner loading-xs"></span> Memuat...
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="card bg-base-100 shadow-xl mb-6">
      <div class="card-body">
        <h2 class="card-title text-sm uppercase tracking-wider opacity-70">
          📋 Log Aktivitas
          <span id="log-count" class="badge badge-sm badge-ghost">0</span>
        </h2>
        <div id="activity-log" class="max-h-48 overflow-y-auto space-y-1 text-sm font-mono">
          <p class="opacity-40">Menunggu koneksi...</p>
        </div>
      </div>
    </div>

    <!-- Panel Warga (Login/Booking) — Person B akan detail -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body">
        <h2 class="card-title">🧑 Panel Warga</h2>
        <p class="text-sm opacity-60">Login untuk booking antrian atau cek status booking Anda.</p>
        <div class="card-actions justify-end mt-4">
          <button id="btn-login-citizen" class="btn btn-primary btn-sm">Masuk</button>
          <button id="btn-register-citizen" class="btn btn-outline btn-sm">Daftar</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast container -->
  <div id="toast-container" class="toast toast-end toast-bottom z-50"></div>

  <!-- Scripts -->
  <script src="js/ws-client.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/activity-log.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/warga.js"></script>
</body>
</html>
