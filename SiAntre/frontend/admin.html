<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SiAntre — Panel Admin SAMSAT" />
  <title>SiAntre — Admin Panel</title>

  <!-- DaisyUI + Tailwind CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- anime.js -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-base-200">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar bg-base-100 shadow-lg sticky top-0 z-50">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl font-bold" href="admin.html">
        <span class="text-secondary">Si</span>Antre
        <span class="badge badge-secondary badge-sm">ADMIN</span>
      </a>
    </div>
    <div class="flex-none gap-2">
      <span id="admin-name" class="text-sm opacity-70"></span>
      <div id="ws-status-badge" class="badge badge-warning gap-1">
        <span class="loading loading-ring loading-xs"></span> Menghubungkan...
      </div>
    </div>
  </nav>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main class="container mx-auto p-4 max-w-7xl">

    <!-- Login Section (ditampilkan kalau belum login) -->
    <div id="admin-login-section" class="flex justify-center items-center min-h-[60vh]">
      <div class="card bg-base-100 shadow-xl w-full max-w-md">
        <div class="card-body">
          <h2 class="card-title justify-center text-2xl mb-4">🔐 Login Petugas</h2>
          <div class="form-control">
            <label class="label"><span class="label-text">ID Pegawai (NIP)</span></label>
            <input id="input-id-pegawai" type="text" placeholder="Contoh: P001"
                   class="input input-bordered" />
          </div>
          <div class="form-control mt-2">
            <label class="label"><span class="label-text">PIN</span></label>
            <input id="input-pin" type="password" placeholder="••••••"
                   class="input input-bordered" />
          </div>
          <div class="card-actions mt-4">
            <button id="btn-admin-login" class="btn btn-secondary w-full">Masuk</button>
          </div>
          <p id="login-error" class="text-error text-sm text-center mt-2 hidden"></p>
        </div>
      </div>
    </div>

    <!-- Dashboard Section (ditampilkan setelah login) -->
    <div id="admin-dashboard-section" class="hidden">

      <!-- Stats Cards -->
      <div class="stats shadow w-full mb-6 bg-base-100">
        <div class="stat">
          <div class="stat-title">Total Booking</div>
          <div id="stat-bookings" class="stat-value text-primary">0</div>
          <div class="stat-desc">Hari ini</div>
        </div>
        <div class="stat">
          <div class="stat-title">Sudah Dilayani</div>
          <div id="stat-served" class="stat-value text-success">0</div>
          <div class="stat-desc">Hari ini</div>
        </div>
        <div class="stat">
          <div class="stat-title">Dibatalkan</div>
          <div id="stat-cancelled" class="stat-value text-error">0</div>
          <div class="stat-desc">Hari ini</div>
        </div>
        <div class="stat">
          <div class="stat-title">Subscriber Aktif</div>
          <div id="stat-subscribers" class="stat-value text-info">0</div>
          <div class="stat-desc">Real-time</div>
        </div>
      </div>

      <!-- Control Panel + Log -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">

        <!-- Command Panel -->
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-sm uppercase tracking-wider opacity-70">⚙️ Kontrol Layanan</h2>

            <!-- Pilih layanan -->
            <select id="select-service" class="select select-bordered w-full mt-2">
              <option disabled selected>Pilih layanan...</option>
            </select>

            <!-- Action buttons -->
            <div class="grid grid-cols-2 gap-2 mt-4">
              <button id="btn-call-next" class="btn btn-primary btn-sm">📢 Panggil Berikutnya</button>
              <button id="btn-checkin" class="btn btn-accent btn-sm">✅ Check-in Warga</button>
              <button id="btn-pause" class="btn btn-warning btn-sm">⏸ Pause Layanan</button>
              <button id="btn-resume" class="btn btn-success btn-sm">▶ Resume Layanan</button>
              <button id="btn-walkin" class="btn btn-info btn-sm col-span-2">🚶 Walk-in Warga</button>
            </div>

            <!-- Announcement -->
            <div class="divider text-xs opacity-50">Pengumuman</div>
            <div class="flex gap-2">
              <input id="input-announce-msg" type="text" placeholder="Tulis pengumuman..."
                     class="input input-bordered input-sm flex-1" />
              <button id="btn-announce" class="btn btn-outline btn-sm">📣 Kirim</button>
            </div>
          </div>
        </div>

        <!-- Activity Log -->
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-sm uppercase tracking-wider opacity-70">
              📋 Log Aktivitas
              <span id="log-count" class="badge badge-sm badge-ghost">0</span>
            </h2>
            <div id="activity-log" class="max-h-64 overflow-y-auto space-y-1 text-sm font-mono">
              <p class="opacity-40">Menunggu koneksi...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Grafik + Queue -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-sm uppercase tracking-wider opacity-70">📊 Grafik Antrian</h2>
            <div id="queue-chart" class="w-full h-64"></div>
          </div>
        </div>
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-sm uppercase tracking-wider opacity-70">👥 Manajemen Petugas</h2>
            <div id="officers-list" class="space-y-2">
              <p class="text-sm opacity-40">Belum ada data petugas.</p>
            </div>
            <div class="card-actions justify-end mt-4">
              <button id="btn-list-officers" class="btn btn-ghost btn-xs">Refresh</button>
              <button id="btn-register-officer" class="btn btn-outline btn-xs">+ Tambah Petugas</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-container" class="toast toast-end toast-bottom z-50"></div>

  <!-- Scripts -->
  <script src="js/ws-client.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/activity-log.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
