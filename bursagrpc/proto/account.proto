syntax = "proto3";
package account;

message RegisterRequest {
  string name = 1;
  double starting_balance = 2;
}

message RegisterResponse {
  string trader_id = 1;
  double balance = 2;
  string message = 3;
}

message LoginRequest {
  string name = 1;
}

message LoginResponse {
  string trader_id = 1;
  double balance = 2;
  bool found = 3;
}

message BalanceRequest {
  string trader_id = 1;
}

message BalanceResponse {
  double cash_balance = 1;
  double portfolio_value = 2;
  double total_equity = 3;
}

message PerformanceRequest {
  string trader_id = 1;
}

message PerformanceResponse {
  double return_rate_pct = 1;
  double win_rate_pct = 2;
  int32 total_trades = 3;
  double best_trade_pnl = 4;
  double worst_trade_pnl = 5;
}

message TradeHistoryRequest {
  string trader_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message TradeRecord {
  string ticker = 1;
  string side = 2;
  int32 quantity = 3;
  double price = 4;
  int64 timestamp = 5;
  double pnl = 6;
}

message TradeHistoryResponse {
  repeated TradeRecord trades = 1;
  int32 total_count = 2;
}

service AccountService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc GetLogin (LoginRequest) returns (LoginResponse);
  rpc GetBalance (BalanceRequest) returns (BalanceResponse);
  rpc GetTradeHistory (TradeHistoryRequest) returns (TradeHistoryResponse);
  rpc GetPerformance (PerformanceRequest) returns (PerformanceResponse);
}
