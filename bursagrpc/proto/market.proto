syntax = "proto3";
package market;

message StockRequest {
  string ticker = 1;
}

message StockResponse {
  string ticker = 1;
  double price = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  int64 volume = 6;
  double change_pct = 7;
  double bid = 8;
  double ask = 9;
}

message WatchRequest {
  repeated string tickers = 1;
}

message MarketUpdate {
  string ticker = 1;
  double price = 2;
  double bid = 3;
  double ask = 4;
  int64 volume = 5;
  double change_pct = 6;
  int64 timestamp = 7;
  double high = 8;
  double low = 9;
}

message LeaderboardRequest {
  int32 top_n = 1;
}

message LeaderboardEntry {
  int32 rank = 1;
  string trader_name = 2;
  double total_equity = 3;
  double return_pct = 4;
  int32 total_trades = 5;
}

message LeaderboardUpdate {
  repeated LeaderboardEntry entries = 1;
  int64 timestamp = 2;
}

message TradeOrderInfo {
  string trader_id = 1;
  string ticker = 2;
  string side = 3;
  int32 quantity = 4;
  double price = 5;
  string type = 6;
}

message TradeAction {
  string action_type = 1;
  TradeOrderInfo order = 2;
  string order_id = 3;
}

message TradeEvent {
  string event_type = 1;
  string order_id = 2;
  double fill_price = 3;
  int32 fill_qty = 4;
  string message = 5;
  int64 timestamp = 6;
}

service MarketService {
  rpc GetStockInfo (StockRequest) returns (StockResponse);
  rpc WatchMarket (WatchRequest) returns (stream MarketUpdate);
  rpc WatchLeaderboard (LeaderboardRequest) returns (stream LeaderboardUpdate);
  rpc StreamTrade (stream TradeAction) returns (stream TradeEvent);
}
